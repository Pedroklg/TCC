# Versão serverless — reúsa o domínio do monolito, sem a camada web.
spring.application.name=petclinic-serverless
spring.main.web-application-type=none

# Perfil que ativa os repositórios Spring Data JPA do monolito.
spring.profiles.active=spring-data-jpa

# O banco já foi inicializado/semeado pelo monolito; aqui não reinicializa.
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Mesmo MySQL compartilhado (decisão metodológica 3).
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/petclinic}
spring.datasource.username=${MYSQL_USER:petclinic}
spring.datasource.password=${MYSQL_PASS:petclinic}

# Função padrão (sobrescrita por SPRING_CLOUD_FUNCTION_DEFINITION em cada Lambda).
spring.cloud.function.definition=getAllOwners
